<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Seoul Tourism Geography VR Lab - K329</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: forest; lighting: point;">
      
      <a-assets>
        <img id="downtown-seoul" src="https://cdn.aframe.io/360-image-gallery-thumbnail-generator/cubes.jpg" crossorigin="anonymous">
        <audio id="ambient-noise" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto" crossorigin="anonymous"></audio>
      </a-assets>

      <a-sky id="vr-sky" src="#downtown-seoul" rotation="0 -90 0"></a-sky>

      <a-entity sound="src: #ambient-noise; autoplay: true; loop: true; volume: 0.6"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          animation__click="property: scale; startEvents: click; easing: easeInCubic; durability: 150; from: 0.1 0.1 0.1; to: 1 1 1"
          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; durability: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
          event-set__mouseenter="_event: mouseenter; color: #FF0000"
          event-set__mouseleave="_event: mouseleave; color: #00FFCC"
          color="#00FFCC" 
          position="0 0 -1">
        </a-cursor>
      </a-entity>

      <a-entity id="station-impetus" position="-3 2 -4" rotation="0 25 0">
        <a-plane width="2.5" height="1.8" color="#111c24" opacity="0.95" material="side: double; transparent: true;"></a-plane>
        <a-plane width="2.6" height="1.9" color="#00FFCC" position="0 0 -0.01" material="side: double;"></a-plane>
        <a-text value="GEOGRAPHIC IMPETUS\n\nPull Factor: Urban Reimaging\nSeoul utilizes high-tech infrastructure and K-Culture to draw international tourism.\n\nTask: Observe the spatial cluster of retail networks surrounding you." 
                align="center" width="2.2" color="#FFFFFF" position="0 0 0.05"></a-text>
      </a-entity>

      <a-entity id="station-challenge" position="3 2 -4" rotation="0 -25 0">
        <a-plane width="2.5" height="1.8" color="#241111" opacity="0.95" material="side: double; transparent: true;"></a-plane>
        <a-plane width="2.6" height="1.9" color="#FF3333" position="0 0 -0.01" material="side: double;"></a-plane>
        <a-text value="DESTINATION CHALLENGES\n\nImpact: Carrying Capacity Exceeded\nHistoric districts like Bukchon face socio-cultural friction, residential displacement, and acoustic pollution.\n\nTask: Identify three physical signs of tourism conflict." 
                align="center" width="2.2" color="#FFFFFF" position="0 0 0.05"></a-text>
      </a-entity>

      <a-entity id="toggle-button" position="0 0.5 -3"
                event-set__mouseenter="_event: mouseenter; scale: 1.1 1.1 1.1"
                event-set__mouseleave="_event: mouseleave; scale: 1 1 1"
                event-set__click="_target: #vr-sky; material.color: #775555;">
        <a-box width="1.2" height="0.4" depth="0.3" color="#FFBB00"></a-box>
        <a-text value="SIMULATE IMPACTS" align="center" width="2.5" color="#000000" position="0 0 0.16"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
